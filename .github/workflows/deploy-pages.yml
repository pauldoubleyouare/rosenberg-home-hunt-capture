# Publishes the static "add a listing" front door (src/) to GitHub Pages.
# Plain HTML/CSS/JS — no build step, so the directory is uploaded as-is.
#
# ONE-TIME MANUAL STEP: GitHub → repo Settings → Pages → "Build and
# deployment" → Source: "GitHub Actions". Until that's set, this workflow's
# deploy step has nowhere to publish to.
name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {} # lets you trigger a deploy by hand from the Actions tab

# Grant the token permission to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site (src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
